# Cloud Build configuration for Python FastAPI backend
# Deploy to: Cloud Run (service name configurable via substitutions)

steps:
  # Step 1: Build Docker image
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "gcr.io/$PROJECT_ID/consent-protocol:manual"
      - "-t"
      - "gcr.io/$PROJECT_ID/consent-protocol:latest"
      - "-t"
      - "gcr.io/$PROJECT_ID/consent-protocol:${_IMAGE_TAG}"
      - "-f"
      - "consent-protocol/Dockerfile"
      - "consent-protocol"
    id: "build-backend-image"

  # Step 2: Push Docker image to Container Registry
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "gcr.io/$PROJECT_ID/consent-protocol:manual"
    id: "push-backend-image"

  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "gcr.io/$PROJECT_ID/consent-protocol:latest"
    id: "push-backend-latest"

  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "gcr.io/$PROJECT_ID/consent-protocol:${_IMAGE_TAG}"
    id: "push-backend-version"

  # Step 3: Deploy to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        set -euo pipefail
        env_vars="ENVIRONMENT=${_ENVIRONMENT},GOOGLE_GENAI_USE_VERTEXAI=True,DB_HOST=${_DB_HOST},DB_PORT=${_DB_PORT},DB_NAME=${_DB_NAME},CONSENT_SSE_ENABLED=${_CONSENT_SSE_ENABLED},SYNC_REMOTE_ENABLED=${_SYNC_REMOTE_ENABLED},DEVELOPER_API_ENABLED=${_DEVELOPER_API_ENABLED},REMOTE_MCP_ENABLED=${_REMOTE_MCP_ENABLED},CORS_ALLOWED_ORIGINS=${_CORS_ALLOWED_ORIGINS},OBS_DATA_STALE_RATIO_THRESHOLD=${_OBS_DATA_STALE_RATIO_THRESHOLD}"
        if [[ -n "${_DB_UNIX_SOCKET}" ]]; then
          env_vars="${env_vars},DB_UNIX_SOCKET=${_DB_UNIX_SOCKET}"
        fi
        if [[ -n "${_PLAID_ENV}" ]]; then
          env_vars="${env_vars},PLAID_ENV=${_PLAID_ENV}"
        fi
        if [[ -n "${_PLAID_CLIENT_NAME}" ]]; then
          env_vars="${env_vars},PLAID_CLIENT_NAME=${_PLAID_CLIENT_NAME}"
        fi
        if [[ -n "${_PLAID_COUNTRY_CODES}" ]]; then
          env_vars="${env_vars},PLAID_COUNTRY_CODES=${_PLAID_COUNTRY_CODES}"
        fi
        if [[ -n "${_PLAID_WEBHOOK_URL}" ]]; then
          env_vars="${env_vars},PLAID_WEBHOOK_URL=${_PLAID_WEBHOOK_URL}"
        fi
        if [[ -n "${_PLAID_REDIRECT_PATH}" ]]; then
          env_vars="${env_vars},PLAID_REDIRECT_PATH=${_PLAID_REDIRECT_PATH}"
        fi
        if [[ -n "${_PLAID_REDIRECT_URI}" ]]; then
          env_vars="${env_vars},PLAID_REDIRECT_URI=${_PLAID_REDIRECT_URI}"
        fi
        if [[ -n "${_PLAID_TX_HISTORY_DAYS}" ]]; then
          env_vars="${env_vars},PLAID_TX_HISTORY_DAYS=${_PLAID_TX_HISTORY_DAYS}"
        fi
        if [[ -n "${_RIA_DEV_BYPASS_ENABLED}" ]]; then
          env_vars="${env_vars},RIA_DEV_BYPASS_ENABLED=${_RIA_DEV_BYPASS_ENABLED}"
        fi

        secrets="SECRET_KEY=SECRET_KEY:latest,VAULT_ENCRYPTION_KEY=VAULT_ENCRYPTION_KEY:latest,GOOGLE_API_KEY=GOOGLE_API_KEY:latest,FIREBASE_SERVICE_ACCOUNT_JSON=FIREBASE_SERVICE_ACCOUNT_JSON:latest,FIREBASE_AUTH_SERVICE_ACCOUNT_JSON=FIREBASE_AUTH_SERVICE_ACCOUNT_JSON:latest,FRONTEND_URL=FRONTEND_URL:latest,DB_USER=DB_USER:latest,DB_PASSWORD=DB_PASSWORD:latest,APP_REVIEW_MODE=APP_REVIEW_MODE:latest,REVIEWER_UID=REVIEWER_UID:latest"
        if [[ -n "${_PLAID_CLIENT_ID_SECRET}" ]]; then
          secrets="${secrets},PLAID_CLIENT_ID=${_PLAID_CLIENT_ID_SECRET}:latest"
        fi
        if [[ -n "${_PLAID_SECRET_SECRET}" ]]; then
          secrets="${secrets},PLAID_SECRET=${_PLAID_SECRET_SECRET}:latest"
        fi
        if [[ -n "${_PLAID_TOKEN_ENCRYPTION_KEY_SECRET}" ]]; then
          secrets="${secrets},PLAID_TOKEN_ENCRYPTION_KEY=${_PLAID_TOKEN_ENCRYPTION_KEY_SECRET}:latest"
        fi
        if [[ -n "${_FINNHUB_API_KEY_SECRET}" ]]; then
          secrets="${secrets},FINNHUB_API_KEY=${_FINNHUB_API_KEY_SECRET}:latest"
        fi
        if [[ -n "${_PMP_API_KEY_SECRET}" ]]; then
          secrets="${secrets},PMP_API_KEY=${_PMP_API_KEY_SECRET}:latest"
        fi
        if [[ -n "${_NEWSAPI_KEY_SECRET}" ]]; then
          secrets="${secrets},NEWSAPI_KEY=${_NEWSAPI_KEY_SECRET}:latest"
        fi

        cmd=(
          gcloud run deploy "${_BACKEND_SERVICE}"
          "--image=gcr.io/$PROJECT_ID/consent-protocol:${_IMAGE_TAG}"
          "--region=${_REGION}"
          "--platform=managed"
          "--allow-unauthenticated"
          "--port=8080"
          "--memory=1Gi"
          "--cpu=1"
          "--timeout=300"
          "--max-instances=10"
          "--min-instances=1"
          "--set-env-vars=${env_vars}"
          "--set-secrets=${secrets}"
        )

        if [[ -n "${_CLOUDSQL_INSTANCES}" ]]; then
          cmd+=("--add-cloudsql-instances=${_CLOUDSQL_INSTANCES}")
        fi

        "${cmd[@]}"
    id: "deploy-backend"

# Images to store in Container Registry
images:
  - "gcr.io/$PROJECT_ID/consent-protocol:manual"
  - "gcr.io/$PROJECT_ID/consent-protocol:latest"
  - "gcr.io/$PROJECT_ID/consent-protocol:${_IMAGE_TAG}"

# Build timeout
timeout: "1200s"

substitutions:
  _BACKEND_SERVICE: consent-protocol
  _REGION: us-central1
  _ENVIRONMENT: production
  _DB_HOST: aws-1-us-east-1.pooler.supabase.com
  _DB_PORT: "5432"
  _DB_NAME: postgres
  _DB_UNIX_SOCKET: ""
  _CLOUDSQL_INSTANCES: ""
  _CORS_ALLOWED_ORIGINS: https://hushh-webapp-XXXXXXXXXX-uc.a.run.app
  _OBS_DATA_STALE_RATIO_THRESHOLD: "0.25"
  _CONSENT_SSE_ENABLED: "false"
  _SYNC_REMOTE_ENABLED: "false"
  _DEVELOPER_API_ENABLED: "false"
  _REMOTE_MCP_ENABLED: "false"
  _PLAID_ENV: ""
  _PLAID_CLIENT_NAME: ""
  _PLAID_COUNTRY_CODES: ""
  _PLAID_WEBHOOK_URL: ""
  _PLAID_REDIRECT_PATH: ""
  _PLAID_REDIRECT_URI: ""
  _PLAID_TX_HISTORY_DAYS: ""
  _RIA_DEV_BYPASS_ENABLED: ""
  _PLAID_CLIENT_ID_SECRET: ""
  _PLAID_SECRET_SECRET: ""
  _PLAID_TOKEN_ENCRYPTION_KEY_SECRET: ""
  _FINNHUB_API_KEY_SECRET: ""
  _PMP_API_KEY_SECRET: ""
  _NEWSAPI_KEY_SECRET: ""
  _IMAGE_TAG: v2.1.0

# Options
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: "E2_HIGHCPU_8"
