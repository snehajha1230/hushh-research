# Cloud Build configuration for Python FastAPI backend
# Deploy to: Cloud Run (service name configurable via substitutions)

steps:
  # Step 1: Build Docker image
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "gcr.io/$PROJECT_ID/consent-protocol:manual"
      - "-t"
      - "gcr.io/$PROJECT_ID/consent-protocol:latest"
      - "-t"
      - "gcr.io/$PROJECT_ID/consent-protocol:${_IMAGE_TAG}"
      - "-f"
      - "consent-protocol/Dockerfile"
      - "consent-protocol"
    id: "build-backend-image"

  # Step 2: Push Docker image to Container Registry
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "gcr.io/$PROJECT_ID/consent-protocol:manual"
    id: "push-backend-image"

  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "gcr.io/$PROJECT_ID/consent-protocol:latest"
    id: "push-backend-latest"

  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "gcr.io/$PROJECT_ID/consent-protocol:${_IMAGE_TAG}"
    id: "push-backend-version"

  # Step 3: Deploy to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        set -euo pipefail
        append_optional_secret() {
          local secret_name="$1"
          local env_name="$2"
          if [[ -z "${secret_name}" ]]; then
            return
          fi
          if gcloud secrets describe "${secret_name}" --project="$PROJECT_ID" >/dev/null 2>&1; then
            secrets="${secrets},${env_name}=${secret_name}:latest"
          else
            echo "Skipping optional secret ${secret_name}; not found in project ${PROJECT_ID}."
          fi
        }

        secrets="APP_SIGNING_KEY=${_APP_SIGNING_KEY_SECRET}:latest,VAULT_DATA_KEY=${_VAULT_DATA_KEY_SECRET}:latest,GOOGLE_API_KEY=GOOGLE_API_KEY:latest,FIREBASE_ADMIN_CREDENTIALS_JSON=${_FIREBASE_ADMIN_CREDENTIALS_SECRET}:latest,APP_FRONTEND_ORIGIN=${_APP_FRONTEND_ORIGIN_SECRET}:latest,BACKEND_RUNTIME_CONFIG_JSON=${_BACKEND_RUNTIME_CONFIG_JSON_SECRET}:latest,DB_USER=DB_USER:latest,DB_PASSWORD=DB_PASSWORD:latest"
        if [[ -n "${_PLAID_CLIENT_ID_SECRET}" ]]; then
          secrets="${secrets},PLAID_CLIENT_ID=${_PLAID_CLIENT_ID_SECRET}:latest"
        fi
        if [[ -n "${_PLAID_SECRET_SECRET}" ]]; then
          secrets="${secrets},PLAID_SECRET=${_PLAID_SECRET_SECRET}:latest"
        fi
        if [[ -n "${_PLAID_ACCESS_TOKEN_KEY_SECRET}" ]]; then
          secrets="${secrets},PLAID_ACCESS_TOKEN_KEY=${_PLAID_ACCESS_TOKEN_KEY_SECRET}:latest"
        fi
        append_optional_secret "${_FINNHUB_API_KEY_SECRET}" "FINNHUB_API_KEY"
        append_optional_secret "${_PMP_API_KEY_SECRET}" "PMP_API_KEY"
        append_optional_secret "${_NEWSAPI_KEY_SECRET}" "NEWSAPI_KEY"
        append_optional_secret "${_GMAIL_OAUTH_CLIENT_ID_SECRET}" "GMAIL_OAUTH_CLIENT_ID"
        append_optional_secret "${_GMAIL_OAUTH_CLIENT_SECRET_SECRET}" "GMAIL_OAUTH_CLIENT_SECRET"
        append_optional_secret "${_GMAIL_OAUTH_REDIRECT_URI_SECRET}" "GMAIL_OAUTH_REDIRECT_URI"
        append_optional_secret "${_GMAIL_OAUTH_TOKEN_KEY_SECRET}" "GMAIL_OAUTH_TOKEN_KEY"
        append_optional_secret "${_OPENAI_API_KEY_SECRET}" "OPENAI_API_KEY"
        append_optional_secret "${_VOICE_RUNTIME_CONFIG_JSON_SECRET}" "VOICE_RUNTIME_CONFIG_JSON"
        append_optional_secret "${_HUSHH_DEVELOPER_TOKEN_SECRET}" "HUSHH_DEVELOPER_TOKEN"

        cmd=(
          gcloud run deploy "${_BACKEND_SERVICE}"
          "--image=gcr.io/$PROJECT_ID/consent-protocol:${_IMAGE_TAG}"
          "--region=${_REGION}"
          "--platform=managed"
          "--allow-unauthenticated"
          "--port=8080"
          "--memory=1Gi"
          "--cpu=1"
          "--timeout=300"
          "--max-instances=10"
          "--min-instances=1"
          "--set-secrets=${secrets}"
        )

        if [[ -n "${_CLOUDSQL_INSTANCES}" ]]; then
          cmd+=("--add-cloudsql-instances=${_CLOUDSQL_INSTANCES}")
        fi

        "${cmd[@]}"
    id: "deploy-backend"

# Images to store in Container Registry
images:
  - "gcr.io/$PROJECT_ID/consent-protocol:manual"
  - "gcr.io/$PROJECT_ID/consent-protocol:latest"
  - "gcr.io/$PROJECT_ID/consent-protocol:${_IMAGE_TAG}"

# Build timeout
timeout: "1200s"

substitutions:
  _BACKEND_SERVICE: consent-protocol
  _REGION: us-central1
  _ENVIRONMENT: production
  _DB_HOST: aws-1-us-east-1.pooler.supabase.com
  _DB_PORT: "5432"
  _DB_NAME: postgres
  _DB_UNIX_SOCKET: ""
  _CLOUDSQL_INSTANCES: ""
  _CORS_ALLOWED_ORIGINS: https://hushh-webapp-XXXXXXXXXX-uc.a.run.app
  _OBS_DATA_STALE_RATIO_THRESHOLD: "0.25"
  _CONSENT_SSE_ENABLED: "false"
  _SYNC_REMOTE_ENABLED: "false"
  _DEVELOPER_API_ENABLED: "false"
  _REMOTE_MCP_ENABLED: "false"
  _PASSKEY_ALLOWED_RP_IDS: ""
  _PLAID_ENV: ""
  _PLAID_CLIENT_NAME: ""
  _PLAID_COUNTRY_CODES: ""
  _PLAID_WEBHOOK_URL: ""
  _PLAID_REDIRECT_PATH: ""
  _PLAID_REDIRECT_URI: ""
  _PLAID_TX_HISTORY_DAYS: ""
  _RIA_DEV_BYPASS_ENABLED: ""
  _PLAID_CLIENT_ID_SECRET: ""
  _PLAID_SECRET_SECRET: ""
  _APP_SIGNING_KEY_SECRET: APP_SIGNING_KEY
  _VAULT_DATA_KEY_SECRET: VAULT_DATA_KEY
  _APP_FRONTEND_ORIGIN_SECRET: APP_FRONTEND_ORIGIN
  _FIREBASE_ADMIN_CREDENTIALS_SECRET: FIREBASE_ADMIN_CREDENTIALS_JSON
  _BACKEND_RUNTIME_CONFIG_JSON_SECRET: BACKEND_RUNTIME_CONFIG_JSON
  _PLAID_ACCESS_TOKEN_KEY_SECRET: ""
  _FINNHUB_API_KEY_SECRET: ""
  _PMP_API_KEY_SECRET: ""
  _NEWSAPI_KEY_SECRET: ""
  _GMAIL_OAUTH_CLIENT_ID_SECRET: ""
  _GMAIL_OAUTH_CLIENT_SECRET_SECRET: ""
  _GMAIL_OAUTH_REDIRECT_URI_SECRET: ""
  _GMAIL_OAUTH_TOKEN_KEY_SECRET: ""
  _OPENAI_API_KEY_SECRET: ""
  _VOICE_RUNTIME_CONFIG_JSON_SECRET: ""
  _HUSHH_DEVELOPER_TOKEN_SECRET: ""
  _IMAGE_TAG: v2.1.0

# Options
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: "E2_HIGHCPU_8"
