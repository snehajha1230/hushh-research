# Cloud Build configuration for Python FastAPI backend
# Deploy to: Cloud Run (service name configurable via substitutions)

steps:
  # Step 1: Build Docker image
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "gcr.io/$PROJECT_ID/consent-protocol:manual"
      - "-t"
      - "gcr.io/$PROJECT_ID/consent-protocol:latest"
      - "-t"
      - "gcr.io/$PROJECT_ID/consent-protocol:${_IMAGE_TAG}"
      - "-f"
      - "consent-protocol/Dockerfile"
      - "consent-protocol"
    id: "build-backend-image"

  # Step 2: Push Docker image to Container Registry
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "gcr.io/$PROJECT_ID/consent-protocol:manual"
    id: "push-backend-image"

  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "gcr.io/$PROJECT_ID/consent-protocol:latest"
    id: "push-backend-latest"

  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "gcr.io/$PROJECT_ID/consent-protocol:${_IMAGE_TAG}"
    id: "push-backend-version"

  # Step 3: Deploy to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        set -euo pipefail
        env_var_delim="##"
        env_vars="ENVIRONMENT=${_ENVIRONMENT}${env_var_delim}GOOGLE_GENAI_USE_VERTEXAI=True${env_var_delim}DB_HOST=${_DB_HOST}${env_var_delim}DB_PORT=${_DB_PORT}${env_var_delim}DB_NAME=${_DB_NAME}${env_var_delim}CONSENT_SSE_ENABLED=${_CONSENT_SSE_ENABLED}${env_var_delim}SYNC_REMOTE_ENABLED=${_SYNC_REMOTE_ENABLED}${env_var_delim}DEVELOPER_API_ENABLED=${_DEVELOPER_API_ENABLED}${env_var_delim}REMOTE_MCP_ENABLED=${_REMOTE_MCP_ENABLED}${env_var_delim}CORS_ALLOWED_ORIGINS=${_CORS_ALLOWED_ORIGINS}${env_var_delim}OBS_DATA_STALE_RATIO_THRESHOLD=${_OBS_DATA_STALE_RATIO_THRESHOLD}"
        if [[ -n "${_PASSKEY_ALLOWED_RP_IDS}" ]]; then
          env_vars="${env_vars}${env_var_delim}PASSKEY_ALLOWED_RP_IDS=${_PASSKEY_ALLOWED_RP_IDS}"
        fi
        if [[ -n "${_DB_UNIX_SOCKET}" ]]; then
          env_vars="${env_vars}${env_var_delim}DB_UNIX_SOCKET=${_DB_UNIX_SOCKET}"
        fi
        if [[ -n "${_PLAID_ENV}" ]]; then
          env_vars="${env_vars}${env_var_delim}PLAID_ENV=${_PLAID_ENV}"
        fi
        if [[ -n "${_PLAID_CLIENT_NAME}" ]]; then
          env_vars="${env_vars}${env_var_delim}PLAID_CLIENT_NAME=${_PLAID_CLIENT_NAME}"
        fi
        if [[ -n "${_PLAID_COUNTRY_CODES}" ]]; then
          env_vars="${env_vars}${env_var_delim}PLAID_COUNTRY_CODES=${_PLAID_COUNTRY_CODES}"
        fi
        if [[ -n "${_PLAID_WEBHOOK_URL}" ]]; then
          env_vars="${env_vars}${env_var_delim}PLAID_WEBHOOK_URL=${_PLAID_WEBHOOK_URL}"
        fi
        if [[ -n "${_PLAID_REDIRECT_PATH}" ]]; then
          env_vars="${env_vars}${env_var_delim}PLAID_REDIRECT_PATH=${_PLAID_REDIRECT_PATH}"
        fi
        if [[ -n "${_PLAID_REDIRECT_URI}" ]]; then
          env_vars="${env_vars}${env_var_delim}PLAID_REDIRECT_URI=${_PLAID_REDIRECT_URI}"
        fi
        if [[ -n "${_PLAID_TX_HISTORY_DAYS}" ]]; then
          env_vars="${env_vars}${env_var_delim}PLAID_TX_HISTORY_DAYS=${_PLAID_TX_HISTORY_DAYS}"
        fi
        if [[ -n "${_RIA_DEV_BYPASS_ENABLED}" ]]; then
          env_vars="${env_vars}${env_var_delim}RIA_DEV_BYPASS_ENABLED=${_RIA_DEV_BYPASS_ENABLED}"
        fi

        append_optional_secret() {
          local secret_name="$1"
          local env_name="$2"
          if [[ -z "${secret_name}" ]]; then
            return
          fi
          if gcloud secrets describe "${secret_name}" --project="$PROJECT_ID" >/dev/null 2>&1; then
            secrets="${secrets},${env_name}=${secret_name}:latest"
          else
            echo "Skipping optional secret ${secret_name}; not found in project ${PROJECT_ID}."
          fi
        }

        secrets="SECRET_KEY=SECRET_KEY:latest,VAULT_ENCRYPTION_KEY=VAULT_ENCRYPTION_KEY:latest,GOOGLE_API_KEY=GOOGLE_API_KEY:latest,FIREBASE_SERVICE_ACCOUNT_JSON=${_FIREBASE_SERVICE_ACCOUNT_SECRET}:latest,FRONTEND_URL=FRONTEND_URL:latest,DB_USER=DB_USER:latest,DB_PASSWORD=DB_PASSWORD:latest,APP_REVIEW_MODE=APP_REVIEW_MODE:latest,REVIEWER_UID=REVIEWER_UID:latest"
        if [[ -n "${_PLAID_CLIENT_ID_SECRET}" ]]; then
          secrets="${secrets},PLAID_CLIENT_ID=${_PLAID_CLIENT_ID_SECRET}:latest"
        fi
        if [[ -n "${_PLAID_SECRET_SECRET}" ]]; then
          secrets="${secrets},PLAID_SECRET=${_PLAID_SECRET_SECRET}:latest"
        fi
        if [[ -n "${_PLAID_TOKEN_ENCRYPTION_KEY_SECRET}" ]]; then
          secrets="${secrets},PLAID_TOKEN_ENCRYPTION_KEY=${_PLAID_TOKEN_ENCRYPTION_KEY_SECRET}:latest"
        fi
        append_optional_secret "${_FINNHUB_API_KEY_SECRET}" "FINNHUB_API_KEY"
        append_optional_secret "${_PMP_API_KEY_SECRET}" "PMP_API_KEY"
        append_optional_secret "${_NEWSAPI_KEY_SECRET}" "NEWSAPI_KEY"

        cmd=(
          gcloud run deploy "${_BACKEND_SERVICE}"
          "--image=gcr.io/$PROJECT_ID/consent-protocol:${_IMAGE_TAG}"
          "--region=${_REGION}"
          "--platform=managed"
          "--allow-unauthenticated"
          "--port=8080"
          "--memory=1Gi"
          "--cpu=1"
          "--timeout=300"
          "--max-instances=10"
          "--min-instances=1"
          "--set-env-vars=^${env_var_delim}^${env_vars}"
          "--set-secrets=${secrets}"
        )

        if [[ -n "${_CLOUDSQL_INSTANCES}" ]]; then
          cmd+=("--add-cloudsql-instances=${_CLOUDSQL_INSTANCES}")
        fi

        "${cmd[@]}"
    id: "deploy-backend"

# Images to store in Container Registry
images:
  - "gcr.io/$PROJECT_ID/consent-protocol:manual"
  - "gcr.io/$PROJECT_ID/consent-protocol:latest"
  - "gcr.io/$PROJECT_ID/consent-protocol:${_IMAGE_TAG}"

# Build timeout
timeout: "1200s"

substitutions:
  _BACKEND_SERVICE: consent-protocol
  _REGION: us-central1
  _ENVIRONMENT: production
  _DB_HOST: aws-1-us-east-1.pooler.supabase.com
  _DB_PORT: "5432"
  _DB_NAME: postgres
  _DB_UNIX_SOCKET: ""
  _CLOUDSQL_INSTANCES: ""
  _CORS_ALLOWED_ORIGINS: https://hushh-webapp-XXXXXXXXXX-uc.a.run.app
  _OBS_DATA_STALE_RATIO_THRESHOLD: "0.25"
  _CONSENT_SSE_ENABLED: "false"
  _SYNC_REMOTE_ENABLED: "false"
  _DEVELOPER_API_ENABLED: "false"
  _REMOTE_MCP_ENABLED: "false"
  _PASSKEY_ALLOWED_RP_IDS: ""
  _PLAID_ENV: ""
  _PLAID_CLIENT_NAME: ""
  _PLAID_COUNTRY_CODES: ""
  _PLAID_WEBHOOK_URL: ""
  _PLAID_REDIRECT_PATH: ""
  _PLAID_REDIRECT_URI: ""
  _PLAID_TX_HISTORY_DAYS: ""
  _RIA_DEV_BYPASS_ENABLED: ""
  _PLAID_CLIENT_ID_SECRET: ""
  _PLAID_SECRET_SECRET: ""
  _PLAID_TOKEN_ENCRYPTION_KEY_SECRET: ""
  _FINNHUB_API_KEY_SECRET: ""
  _PMP_API_KEY_SECRET: ""
  _NEWSAPI_KEY_SECRET: ""
  _FIREBASE_SERVICE_ACCOUNT_SECRET: FIREBASE_SERVICE_ACCOUNT_JSON
  _IMAGE_TAG: v2.1.0

# Options
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: "E2_HIGHCPU_8"
