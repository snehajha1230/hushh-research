# Cloud Build configuration for Next.js frontend
# Trigger: Push to main branch or manual trigger
# Deploy to: Cloud Run (hushh-webapp service)

steps:
  # Step 1: Build Docker image with production environment variables (using Secrets)
  - name: "gcr.io/cloud-builders/docker"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        set -euo pipefail
        required_vars=(
          NEXT_PUBLIC_FIREBASE_API_KEY_VAL
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN_VAL
          NEXT_PUBLIC_FIREBASE_PROJECT_ID_VAL
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET_VAL
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID_VAL
          NEXT_PUBLIC_FIREBASE_APP_ID_VAL
          NEXT_PUBLIC_FIREBASE_VAPID_KEY_VAL
          BACKEND_URL_VAL
        )
        for name in "${required_vars[@]}"; do
          if [ -z "${!name}" ]; then
            echo "Missing required frontend build config: ${name}"
            exit 1
          fi
        done

        docker build \
          -t gcr.io/$PROJECT_ID/hushh-webapp:manual \
          -t gcr.io/$PROJECT_ID/hushh-webapp:latest \
          -t gcr.io/$PROJECT_ID/hushh-webapp:v2.1.2 \
          --build-arg NEXT_PUBLIC_FIREBASE_API_KEY=$$NEXT_PUBLIC_FIREBASE_API_KEY_VAL \
          --build-arg NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=$$NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN_VAL \
          --build-arg NEXT_PUBLIC_FIREBASE_PROJECT_ID=$$NEXT_PUBLIC_FIREBASE_PROJECT_ID_VAL \
          --build-arg NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=$$NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET_VAL \
          --build-arg NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=$$NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID_VAL \
          --build-arg NEXT_PUBLIC_FIREBASE_APP_ID=$$NEXT_PUBLIC_FIREBASE_APP_ID_VAL \
          --build-arg NEXT_PUBLIC_FIREBASE_VAPID_KEY=$$NEXT_PUBLIC_FIREBASE_VAPID_KEY_VAL \
          --build-arg NEXT_PUBLIC_BACKEND_URL=$$BACKEND_URL_VAL \
          -f hushh-webapp/Dockerfile \
          hushh-webapp
    secretEnv: [
      "BACKEND_URL_VAL",
      "NEXT_PUBLIC_FIREBASE_API_KEY_VAL",
      "NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN_VAL",
      "NEXT_PUBLIC_FIREBASE_PROJECT_ID_VAL",
      "NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET_VAL",
      "NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID_VAL",
      "NEXT_PUBLIC_FIREBASE_APP_ID_VAL",
      "NEXT_PUBLIC_FIREBASE_VAPID_KEY_VAL"
    ]
    id: "build-frontend-image"

  # Step 2: Push Docker image to Container Registry
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "gcr.io/$PROJECT_ID/hushh-webapp:manual"
    id: "push-frontend-image"

  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "gcr.io/$PROJECT_ID/hushh-webapp:latest"
    id: "push-frontend-latest"

  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "gcr.io/$PROJECT_ID/hushh-webapp:v2.1.2"
    id: "push-frontend-version"

  # Step 3: Deploy to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "hushh-webapp"
      - "--image=gcr.io/$PROJECT_ID/hushh-webapp:v2.1.2"
      - "--region=us-central1"
      - "--platform=managed"
      - "--allow-unauthenticated"
      - "--port=8080"
      - "--memory=512Mi"
      - "--cpu=1"
      - "--timeout=60"
      - "--max-instances=10"
      - "--min-instances=1"
      - "--set-secrets=APPLE_TEAM_ID=APPLE_TEAM_ID:latest,NEXT_PUBLIC_IOS_BUNDLE_ID=NEXT_PUBLIC_IOS_BUNDLE_ID:latest,NEXT_PUBLIC_ANDROID_APP_ID=NEXT_PUBLIC_ANDROID_APP_ID:latest,ANDROID_SHA256_CERT_FINGERPRINTS=ANDROID_SHA256_CERT_FINGERPRINTS:latest"
    id: "deploy-frontend"

# Images to store in Container Registry
images:
  - "gcr.io/$PROJECT_ID/hushh-webapp:manual"
  - "gcr.io/$PROJECT_ID/hushh-webapp:latest"

# Build timeout
timeout: "1200s"

# Secrets to fetch
availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/BACKEND_URL/versions/latest
      env: "BACKEND_URL_VAL"
    - versionName: projects/$PROJECT_ID/secrets/NEXT_PUBLIC_FIREBASE_API_KEY/versions/latest
      env: "NEXT_PUBLIC_FIREBASE_API_KEY_VAL"
    - versionName: projects/$PROJECT_ID/secrets/NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN/versions/latest
      env: "NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN_VAL"
    - versionName: projects/$PROJECT_ID/secrets/NEXT_PUBLIC_FIREBASE_PROJECT_ID/versions/latest
      env: "NEXT_PUBLIC_FIREBASE_PROJECT_ID_VAL"
    - versionName: projects/$PROJECT_ID/secrets/NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET/versions/latest
      env: "NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET_VAL"
    - versionName: projects/$PROJECT_ID/secrets/NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID/versions/latest
      env: "NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID_VAL"
    - versionName: projects/$PROJECT_ID/secrets/NEXT_PUBLIC_FIREBASE_APP_ID/versions/latest
      env: "NEXT_PUBLIC_FIREBASE_APP_ID_VAL"
    - versionName: projects/$PROJECT_ID/secrets/NEXT_PUBLIC_FIREBASE_VAPID_KEY/versions/latest
      env: "NEXT_PUBLIC_FIREBASE_VAPID_KEY_VAL"

# Options
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: "E2_HIGHCPU_8"
