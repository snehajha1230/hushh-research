name: Deploy to UAT

on:
  workflow_run:
    workflows:
      - "Main Post-Merge Smoke"
    types:
      - completed
    branches:
      - main
  workflow_dispatch:
    inputs:
      scope:
        description: "Deploy backend only, frontend only, or both"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - backend
          - frontend
      sha:
        description: "Exact green main SHA to deploy (blank defaults to latest origin/main)"
        required: false
        type: string

permissions:
  contents: read
  checks: read

env:
  GCP_PROJECT_ID: hushh-pda-uat
  GCP_REGION: us-central1
  BACKEND_SERVICE: consent-protocol
  FRONTEND_SERVICE: hushh-webapp
  UAT_CLOUDSQL_INSTANCE: hushh-pda-uat:us-central1:hushh-uat-pg
  UAT_DB_UNIX_SOCKET: /cloudsql/hushh-pda-uat:us-central1:hushh-uat-pg
  CLOUD_RUN_REVISION_RETENTION: "10"

concurrency:
  group: deploy-uat-${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.event.inputs.sha || github.run_id }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy UAT Scope
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.event == 'push' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')

    steps:
      - name: Assert manual dispatch originates from main
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF_NAME}" != "main" ]; then
            echo "Refusing UAT deploy from '${GITHUB_REF_NAME}'. Trigger this workflow from 'main' only."
            exit 1
          fi

      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main

      - name: Assert manual UAT dispatch actor policy
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/ci/assert-governed-actor.py --surface uat --actor "${GITHUB_ACTOR}"

      - name: Resolve deployment SHA
        id: resolve-sha
        shell: bash
        run: |
          set -euo pipefail
          if [ "${GITHUB_EVENT_NAME}" = "workflow_run" ]; then
            DEPLOY_SHA="${{ github.event.workflow_run.head_sha }}"
          elif [ -n "${{ github.event.inputs.sha }}" ]; then
            DEPLOY_SHA="${{ github.event.inputs.sha }}"
          else
            git fetch --no-tags origin main
            DEPLOY_SHA="$(git rev-parse origin/main)"
          fi

          echo "sha=$DEPLOY_SHA" >> "$GITHUB_OUTPUT"

      - name: Validate deployment SHA against main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REQUIRED_BRANCH: main
          REQUIRE_CI_SUCCESS: "1"
          REQUIRED_CHECK_NAME: "Main Post-Merge Smoke Gate"
        run: bash scripts/ci/require-deploy-sha-on-main.sh "${{ steps.resolve-sha.outputs.sha }}"

      - name: Checkout deployment SHA
        shell: bash
        run: |
          set -euo pipefail
          git checkout --detach "${{ steps.resolve-sha.outputs.sha }}"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY_UAT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Set GCP project context
        run: gcloud config set project "${{ env.GCP_PROJECT_ID }}"

      - name: Assert GCP project scope
        shell: bash
        run: |
          set -euo pipefail
          ACTIVE_PROJECT="$(gcloud config get-value project 2>/dev/null)"
          if [ "$ACTIVE_PROJECT" != "${{ env.GCP_PROJECT_ID }}" ]; then
            echo "Refusing deploy: expected project '${{ env.GCP_PROJECT_ID }}' but got '$ACTIVE_PROJECT'."
            exit 1
          fi

      - name: Resolve deployment scope
        id: scope
        shell: bash
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            SCOPE="${{ github.event.inputs.scope }}"
          else
            SCOPE="all"
          fi

          case "$SCOPE" in
            backend)
              DEPLOY_BACKEND=true
              DEPLOY_FRONTEND=false
              ;;
            frontend)
              DEPLOY_BACKEND=false
              DEPLOY_FRONTEND=true
              ;;
            *)
              SCOPE="all"
              DEPLOY_BACKEND=true
              DEPLOY_FRONTEND=true
              ;;
          esac

          echo "scope=$SCOPE" >> "$GITHUB_OUTPUT"
          echo "deploy_backend=$DEPLOY_BACKEND" >> "$GITHUB_OUTPUT"
          echo "deploy_frontend=$DEPLOY_FRONTEND" >> "$GITHUB_OUTPUT"

      - name: Set up Python for UAT DB governance
        if: steps.scope.outputs.deploy_backend == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install UAT DB governance dependencies
        if: steps.scope.outputs.deploy_backend == 'true'
        run: python3 -m pip install --disable-pip-version-check asyncpg python-dotenv

      - name: Install Cloud SQL Auth Proxy
        if: steps.scope.outputs.deploy_backend == 'true'
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL \
            https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.18.3/cloud-sql-proxy.linux.amd64 \
            -o /usr/local/bin/cloud-sql-proxy
          chmod +x /usr/local/bin/cloud-sql-proxy

      - name: Apply UAT DB migrations and predeploy schema gate
        if: steps.scope.outputs.deploy_backend == 'true'
        shell: bash
        run: |
          set -euo pipefail

          DB_USER="$(gcloud secrets versions access latest --secret=DB_USER --project="${{ env.GCP_PROJECT_ID }}")"
          DB_PASSWORD="$(gcloud secrets versions access latest --secret=DB_PASSWORD --project="${{ env.GCP_PROJECT_ID }}")"
          echo "::add-mask::${DB_USER}"
          echo "::add-mask::${DB_PASSWORD}"

          cloud-sql-proxy \
            --address 127.0.0.1 \
            --port 6543 \
            ${GOOGLE_GHA_CREDS_PATH:+--credentials-file="${GOOGLE_GHA_CREDS_PATH}"} \
            "${{ env.UAT_CLOUDSQL_INSTANCE }}" >/tmp/cloud-sql-proxy-uat.log 2>&1 &
          PROXY_PID=$!
          trap 'kill "${PROXY_PID}" >/dev/null 2>&1 || true' EXIT

          python3 - <<'PY'
          import socket
          import time

          deadline = time.time() + 20
          while time.time() < deadline:
              with socket.socket() as sock:
                  sock.settimeout(0.5)
                  if sock.connect_ex(("127.0.0.1", 6543)) == 0:
                      raise SystemExit(0)
              time.sleep(0.25)
          raise SystemExit("Cloud SQL proxy did not bind 127.0.0.1:6543 in time")
          PY

          export DB_HOST=127.0.0.1
          export DB_PORT=6543
          export DB_NAME=postgres
          export DB_USER
          export DB_PASSWORD

          (
            cd consent-protocol
            python3 db/migrate.py --release
          )
          python3 scripts/ops/db_migration_release_guard.py \
            --contract-file consent-protocol/db/schema_contract/uat_integrated_schema.json \
            --report-path /tmp/uat-db-migration-guard-predeploy.json

      - name: Deploy backend using Cloud Build
        if: steps.scope.outputs.deploy_backend == 'true'
        run: |
          NEWS_API_SECRET_NAME="NEWSAPI_KEY"
          PMP_API_SECRET_NAME="PMP_API_KEY"
          FINNHUB_API_SECRET_NAME="FINNHUB_API_KEY"
          SUBSTITUTIONS="_BACKEND_SERVICE=${{ env.BACKEND_SERVICE }}##_REGION=${{ env.GCP_REGION }}##_ENVIRONMENT=uat##_DB_HOST=cloudsql-socket##_DB_PORT=5432##_DB_NAME=postgres##_DB_UNIX_SOCKET=${{ env.UAT_DB_UNIX_SOCKET }}##_CLOUDSQL_INSTANCES=${{ env.UAT_CLOUDSQL_INSTANCE }}##_CORS_ALLOWED_ORIGINS=https://uat.kai.hushh.ai##_PASSKEY_ALLOWED_RP_IDS=localhost,127.0.0.1,kai.hushh.ai,uat.kai.hushh.ai##_OBS_DATA_STALE_RATIO_THRESHOLD=0.25##_CONSENT_SSE_ENABLED=true##_SYNC_REMOTE_ENABLED=false##_DEVELOPER_API_ENABLED=true##_REMOTE_MCP_ENABLED=true##_PLAID_ENV=production##_PLAID_CLIENT_NAME=Hushh Kai##_PLAID_COUNTRY_CODES=US##_PLAID_WEBHOOK_URL=https://uat.kai.hushh.ai/api/kai/plaid/webhook##_PLAID_REDIRECT_PATH=/kai/plaid/oauth/return##_PLAID_TX_HISTORY_DAYS=730##_RIA_DEV_BYPASS_ENABLED=true##_PLAID_CLIENT_ID_SECRET=PLAID_CLIENT_ID##_PLAID_SECRET_SECRET=PLAID_SECRET##_PLAID_TOKEN_ENCRYPTION_KEY_SECRET=PLAID_TOKEN_ENCRYPTION_KEY##_FINNHUB_API_KEY_SECRET=${FINNHUB_API_SECRET_NAME}##_PMP_API_KEY_SECRET=${PMP_API_SECRET_NAME}##_NEWSAPI_KEY_SECRET=${NEWS_API_SECRET_NAME}##_FIREBASE_SERVICE_ACCOUNT_SECRET=FIREBASE_SERVICE_ACCOUNT_JSON"
          gcloud builds submit \
            --project="${{ env.GCP_PROJECT_ID }}" \
            --config=deploy/backend.cloudbuild.yaml \
            "--substitutions=^##^${SUBSTITUTIONS}"

      - name: Get backend URL
        if: steps.scope.outputs.deploy_backend == 'true'
        id: backend-url
        run: |
          BACKEND_URL=$(gcloud run services describe ${{ env.BACKEND_SERVICE }} \
            --project=${{ env.GCP_PROJECT_ID }} \
            --region=${{ env.GCP_REGION }} \
            --format='value(status.url)')
          echo "url=$BACKEND_URL" >> $GITHUB_OUTPUT
          echo "Backend URL: $BACKEND_URL"

      - name: Retain latest backend revisions
        if: steps.scope.outputs.deploy_backend == 'true'
        continue-on-error: true
        run: bash scripts/ci/cloudrun-retention.sh "${{ env.BACKEND_SERVICE }}" "${{ env.GCP_REGION }}" "${{ env.CLOUD_RUN_REVISION_RETENTION }}"

      - name: Deploy frontend using Cloud Build
        if: steps.scope.outputs.deploy_frontend == 'true'
        run: |
          gcloud builds submit \
            --project="${{ env.GCP_PROJECT_ID }}" \
            --config=deploy/frontend.cloudbuild.yaml \
            "--substitutions=_FRONTEND_SERVICE=${{ env.FRONTEND_SERVICE }},_REGION=${{ env.GCP_REGION }},_APP_ENV=uat"

      - name: Get frontend URL
        if: steps.scope.outputs.deploy_frontend == 'true'
        id: frontend-url
        run: |
          FRONTEND_URL=$(gcloud run services describe ${{ env.FRONTEND_SERVICE }} \
            --project=${{ env.GCP_PROJECT_ID }} \
            --region=${{ env.GCP_REGION }} \
            --format='value(status.url)')
          echo "url=$FRONTEND_URL" >> $GITHUB_OUTPUT
          echo "Frontend URL: $FRONTEND_URL"

      - name: Update backend CORS allowlist to UAT frontend
        if: steps.scope.outputs.deploy_frontend == 'true'
        run: |
          RUN_APP_FRONTEND_URL="${{ steps.frontend-url.outputs.url }}"
          CUSTOM_FRONTEND_URL="$(gcloud secrets versions access latest \
            --secret=FRONTEND_URL \
            --project="${{ env.GCP_PROJECT_ID }}")"
          BACKEND_SERVICE_JSON="$(gcloud run services describe "${{ env.BACKEND_SERVICE }}" \
            --project="${{ env.GCP_PROJECT_ID }}" \
            --region="${{ env.GCP_REGION }}" \
            --format=json)"
          EXISTING_CORS="$(printf '%s' "${BACKEND_SERVICE_JSON}" | jq -r \
            '.spec.template.spec.containers[0].env[]? | select(.name=="CORS_ALLOWED_ORIGINS") | .value' | head -n1)"

          MERGED_CORS="$(python3 - <<'PY' "${EXISTING_CORS}" "${CUSTOM_FRONTEND_URL}" "${RUN_APP_FRONTEND_URL}"
          import sys
          from urllib.parse import urlparse

          def normalize(origin: str) -> str:
              raw = (origin or "").strip()
              if not raw:
                  return ""
              parsed = urlparse(raw)
              if parsed.scheme and parsed.netloc:
                  return f"{parsed.scheme}://{parsed.netloc}"
              return ""

          seen = set()
          ordered = []
          for arg in sys.argv[1:]:
              for item in (arg or "").split(","):
                  origin = normalize(item)
                  if origin and origin not in seen:
                      seen.add(origin)
                      ordered.append(origin)

          print(",".join(ordered))
          PY
          )"

          # Use a custom delimiter so comma-separated origins are treated as one env var value.
          gcloud run services update "${{ env.BACKEND_SERVICE }}" \
            --project="${{ env.GCP_PROJECT_ID }}" \
            --region="${{ env.GCP_REGION }}" \
            --update-env-vars "^##^CORS_ALLOWED_ORIGINS=${MERGED_CORS}"

      - name: Retain latest frontend revisions
        if: steps.scope.outputs.deploy_frontend == 'true'
        continue-on-error: true
        run: bash scripts/ci/cloudrun-retention.sh "${{ env.FRONTEND_SERVICE }}" "${{ env.GCP_REGION }}" "${{ env.CLOUD_RUN_REVISION_RETENTION }}"

      - name: Verify UAT runtime env parity
        if: steps.scope.outputs.deploy_backend == 'true' || steps.scope.outputs.deploy_frontend == 'true'
        run: |
          python3 scripts/ops/verify-env-secrets-parity.py \
            --project "${{ env.GCP_PROJECT_ID }}" \
            --region "${{ env.GCP_REGION }}" \
            --backend-service "${{ env.BACKEND_SERVICE }}" \
            --frontend-service "${{ env.FRONTEND_SERVICE }}" \
            --require-plaid \
            --require-market-data \
            --assert-runtime-env-contract

      - name: Post-deploy UAT schema contract gate
        if: steps.scope.outputs.deploy_backend == 'true'
        shell: bash
        run: |
          set -euo pipefail

          DB_USER="$(gcloud secrets versions access latest --secret=DB_USER --project="${{ env.GCP_PROJECT_ID }}")"
          DB_PASSWORD="$(gcloud secrets versions access latest --secret=DB_PASSWORD --project="${{ env.GCP_PROJECT_ID }}")"
          echo "::add-mask::${DB_USER}"
          echo "::add-mask::${DB_PASSWORD}"

          cloud-sql-proxy \
            --address 127.0.0.1 \
            --port 6543 \
            ${GOOGLE_GHA_CREDS_PATH:+--credentials-file="${GOOGLE_GHA_CREDS_PATH}"} \
            "${{ env.UAT_CLOUDSQL_INSTANCE }}" >/tmp/cloud-sql-proxy-uat-postdeploy.log 2>&1 &
          PROXY_PID=$!
          trap 'kill "${PROXY_PID}" >/dev/null 2>&1 || true' EXIT

          python3 - <<'PY'
          import socket
          import time

          deadline = time.time() + 20
          while time.time() < deadline:
              with socket.socket() as sock:
                  sock.settimeout(0.5)
                  if sock.connect_ex(("127.0.0.1", 6543)) == 0:
                      raise SystemExit(0)
              time.sleep(0.25)
          raise SystemExit("Cloud SQL proxy did not bind 127.0.0.1:6543 in time")
          PY

          export DB_HOST=127.0.0.1
          export DB_PORT=6543
          export DB_NAME=postgres
          export DB_USER
          export DB_PASSWORD

          python3 scripts/ops/db_migration_release_guard.py \
            --contract-file consent-protocol/db/schema_contract/uat_integrated_schema.json \
            --report-path /tmp/uat-db-migration-guard-postdeploy.json

      - name: Upload UAT DB governance artifacts
        if: always() && steps.scope.outputs.deploy_backend == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: uat-db-governance-${{ github.run_id }}
          if-no-files-found: ignore
          path: |
            /tmp/uat-db-migration-guard-predeploy.json
            /tmp/uat-db-migration-guard-postdeploy.json
            /tmp/cloud-sql-proxy-uat.log
            /tmp/cloud-sql-proxy-uat-postdeploy.log

      - name: Deployment Summary
        if: always()
        shell: bash
        run: |
          echo "UAT Deployment Complete"
          echo "Commit SHA: ${{ steps.resolve-sha.outputs.sha }}"
          echo "Scope: ${{ steps.scope.outputs.scope }}"
          if [ "${{ steps.scope.outputs.deploy_backend }}" = "true" ]; then
            echo "Backend: ${{ steps.backend-url.outputs.url }}"
          else
            echo "Backend: skipped"
          fi
          if [ "${{ steps.scope.outputs.deploy_frontend }}" = "true" ]; then
            echo "Frontend: ${{ steps.frontend-url.outputs.url }}"
          else
            echo "Frontend: skipped"
          fi
