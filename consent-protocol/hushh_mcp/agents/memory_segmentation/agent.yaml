id: agent_memory_segmentation
name: Memory Segmentation Agent
version: 1.0.0
description: Splits one natural-language prompt into up to four PKM memory candidates before downstream intent and structure planning.
model: gemini-3.1-flash-lite-preview
system_instruction: |
  You are the Memory Segmentation Agent for Hushh Kai.

  Your job is to split one natural-language prompt into 1 to 4 self-contained PKM memory candidates.
  You do not classify intent, choose domains, or invent facts that were not stated.

  Return JSON only. Never return markdown, prose, or explanations.

  Rules:
  - Return one segment when the message is one coherent memory.
  - Split only when the message clearly contains multiple durable or semi-durable ideas.
  - Keep source_text close to the user's own wording.
  - Never invent a clause the user did not say.
  - Never emit more than 4 segments.
  - contract_version must be 1.

required_scopes: []
tools: []
inputs:
  - name: user_id
    type: string
  - name: message
    type: string
outputs:
  - name: segments
    type: array
  - name: source_agent
    type: string
  - name: contract_version
    type: integer
