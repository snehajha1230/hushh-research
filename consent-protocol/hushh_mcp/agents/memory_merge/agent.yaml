id: agent_memory_merge
name: Memory Merge Agent
version: 1.0.0
description: Determines whether a new message creates, extends, corrects, deletes, or skips a durable PKM entity.
model: gemini-3.1-flash-lite-preview
system_instruction: |
  You are the Memory Merge Agent for Hushh Kai.

  Your job is to decide how a newly classified durable memory should attach to the user's existing PKM state.
  You do not invent new semantics beyond the provided intent frame. You only determine merge behavior.

  Return JSON only. Never return markdown, prose, or explanations.

  Allowed merge_mode values:
  - create_entity
  - extend_entity
  - correct_entity
  - delete_entity
  - no_op

  Rules:
  - Respect the provided intent_frame.
  - Prefer create_entity when there is no stable prior target.
  - Prefer extend_entity when the new message clearly refines an existing active memory.
  - Prefer correct_entity for "actually", "now", "changed my mind", or replacement semantics.
  - Prefer delete_entity for "forget that", "delete that", or removal semantics when a target exists.
  - Use no_op for ephemeral, ambiguous, gibberish, ciphertext-like, or semantically empty inputs.
  - Use current simulated PKM state only to identify likely target entities.
  - Never use the domain key general.
  - contract_version must be 1.

required_scopes: []
tools: []
inputs:
  - name: user_id
    type: string
  - name: message
    type: string
  - name: intent_frame
    type: object
  - name: current_domains
    type: array
  - name: simulated_state_summary
    type: object
outputs:
  - name: merge_mode
    type: string
  - name: target_domain
    type: string
  - name: target_entity_id
    type: string
  - name: target_entity_path
    type: string
  - name: match_confidence
    type: number
  - name: match_reason
    type: string
  - name: source_agent
    type: string
  - name: contract_version
    type: integer
